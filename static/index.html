<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIM — Agent Instances Manager</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23ff6b1a'/><text x='32' y='43' text-anchor='middle' font-family='monospace' font-size='28' font-weight='900' fill='%23000'>AIM</text></svg>" />
    <link rel="stylesheet" href="/static/vendor/inter.css" />
    <link rel="stylesheet" href="/static/vendor/xterm.min.css" />
    <link rel="stylesheet" href="/static/style.css?v=78" />
  </head>
  <body>
    <aside id="sidebar">
      <button id="sidebarToggle" class="sidebar-toggle" title="Collapse sidebar" aria-label="Collapse sidebar">‹</button>
      <div class="brand">
        <span class="brand-name">A<span class="brand-dot">·</span>I<span class="brand-dot">·</span>M</span>
      </div>
      <div class="config-section">
        <div class="section-label"><span>Configuration</span></div>
        <button class="config-nav" data-config="mcp" title="MCP server configurations">
          <span class="config-icon">⚙</span>
          <span class="config-nav-label">MCP Servers</span>
        </button>
        <button class="config-nav" data-config="skills" title="Custom slash commands">
          <span class="config-icon">⌘</span>
          <span class="config-nav-label">Skills</span>
        </button>
        <button class="config-nav" data-config="claudemd" title="CLAUDE.md instructions">
          <span class="config-icon">📋</span>
          <span class="config-nav-label">CLAUDE.md</span>
        </button>
        <button class="config-nav" id="settingsHammerspoon" title="Settings">
          <span class="config-icon">⚙</span>
          <span class="config-nav-label">Settings</span>
        </button>
      </div>
      <div class="group-list-wrap">
        <div class="section-label">
          <span>Groups</span>
          <button id="newGroupBtn" title="Create group">＋</button>
        </div>
        <div id="groupNav"></div>
      </div>
      <div class="foot">
        <span id="updated">—</span>
      </div>
    </aside>

    <section id="listCol">
      <header class="col-head">
        <button id="newInstanceBtn" class="list-new-btn" title="New instance">＋</button>
        <div class="search-wrap">
          <input id="search" placeholder="Search…" />
          <kbd>/</kbd>
        </div>
        <div class="filter-wrap">
          <button id="filterBtn" class="filter-btn" title="Filter by status">
            <span class="filter-dot"></span>
            <span class="filter-label">All</span>
          </button>
          <div class="filter-menu" id="filterMenu">
            <button data-filter="all"><span class="dot"></span>All</button>
            <button data-filter="needs_input"><span class="dot needs_input"></span>Needs input</button>
            <button data-filter="running"><span class="dot running"></span>Running</button>
            <button data-filter="idle"><span class="dot idle"></span>Idle</button>
            <button data-filter="ended"><span class="dot ended"></span>Ended</button>
            <hr />
            <label class="filter-chk"><input type="checkbox" id="showEnded" />Show ended</label>
          </div>
        </div>
        <button id="openFullBtn" title="Open full dashboard in browser">⤢</button>
      </header>
      <div id="list"></div>
    </section>

    <section id="previewCol">
      <div id="preview">
        <div class="empty">
          <div class="empty-cursor">█</div>
          <h3>No instance selected</h3>
          <p>Pick one on the left or click <b>＋ New instance</b> to start one.</p>
        </div>
      </div>
    </section>

    <template id="listCardTpl">
      <button class="list-card" data-sid="">
        <span class="lc-stripe"></span>
        <span class="lc-sprite"></span>
        <div class="lc-body">
          <div class="lc-status-row">
            <span class="lc-status-glyph"></span>
            <span class="lc-status-text"></span>
            <span class="lc-status-time"></span>
          </div>
          <div class="lc-name"></div>
          <div class="lc-cwd"></div>
          <div class="lc-notif"></div>
          <div class="lc-meta"></div>
        </div>
      </button>
    </template>

    <template id="previewTpl">
      <div class="preview-root">
        <header class="term-header">
          <div class="term-dots"></div>
          <div class="term-title">
            <span class="term-title-sprite"></span>
            <span class="term-title-name"></span>
            <span class="term-title-status"></span>
          </div>
          <div class="term-actions">
            <button class="term-btn-text ph-edit" title="Edit name, group, cwd, MCPs">Edit</button>
            <button class="term-btn-text ph-open-term" title="Open in native terminal">Terminal</button>
            <button class="term-btn-text ph-stop danger" title="Stop this instance">Stop</button>
            <div class="menu-wrap">
              <button class="term-btn ph-more" title="More">⋯</button>
              <div class="menu">
                <button data-act="focus">Focus terminal</button>
                <button data-act="sigint">Send SIGINT (Ctrl-C)</button>
                <button data-act="forget">Forget state</button>
              </div>
            </div>
          </div>
        </header>

        <div class="meta-strip">
          <span class="chip ph-cwd"></span>
          <span class="chip ph-pid"></span>
          <span class="chip ph-group-chip"></span>
          <span class="chip ph-mcp-chip"></span>
          <span class="chip ph-sid"></span>
        </div>

        <div class="subagent-strip"></div>

        <div class="summary-strip">
          <div class="summary-label">Summary</div>
          <div class="summary-paragraph">
            <span class="summary-para-text"></span>
          </div>
        </div>

        <div class="term-body" id="termBody">
          <div class="xterm-host" id="xtermHost"></div>
        </div>

        <div class="notif-banner"></div>
      </div>
    </template>

    <template id="configEditorTpl">
      <div class="config-editor-root">
        <header class="config-editor-head">
          <div class="config-editor-title">
            <span class="config-editor-icon">⚙</span>
            <span class="config-editor-path"></span>
          </div>
          <div class="config-editor-actions">
            <button class="term-btn-text ce-save" title="Save changes">Save</button>
            <button class="term-btn-text ce-close" title="Close editor">Close</button>
          </div>
        </header>
        <div class="config-editor-sidebar">
          <div class="ce-file-list"></div>
          <button class="ce-new-btn">＋ New</button>
        </div>
        <div class="config-editor-body">
          <textarea class="ce-textarea" spellcheck="false"></textarea>
        </div>
        <div class="config-editor-status">
          <span class="ce-status-text">Ready</span>
        </div>
      </div>
    </template>

    <template id="newInstanceModalTpl">
      <div class="modal-backdrop new-instance-modal">
        <div class="modal-card">
          <h2>New Claude instance</h2>
          <p class="modal-sub">Spawns a <code>claude</code> session inside tmux. It will appear in the list as soon as the first hook fires.</p>
          <label class="modal-label">Name (optional)</label>
          <input class="modal-input name-input" placeholder="e.g. Grafana work" autofocus />
          <label class="modal-label">Working directory</label>
          <input class="modal-input cwd-input" placeholder="/path/to/project" list="recentCwdsList" />
          <datalist id="recentCwdsList"></datalist>
          <div class="recent-cwds"></div>
          <label class="modal-label">MCP source (path to mcp.json)</label>
          <input class="modal-input mcp-source-input" placeholder="~/.claude.json" spellcheck="false" />
          <div class="mcp-source-pills"></div>
          <label class="modal-label">MCPs</label>
          <div class="mcp-picker">
            <div class="mcp-picker-empty">Set a source path above</div>
          </div>
          <label class="modal-label">Command</label>
          <input class="modal-input cmd-input" value="claude" />
          <div class="modal-actions">
            <button class="modal-btn cancel">Cancel</button>
            <button class="modal-btn primary ok">Start</button>
          </div>
        </div>
      </div>
    </template>

    <template id="settingsTpl">
      <div class="modal-backdrop settings-modal">
        <div class="modal-card">
          <h2>Settings</h2>
          <div class="settings-status" id="hsStatus"></div>

          <label class="modal-label">Notification sound</label>
          <label class="settings-toggle">
            <input type="checkbox" id="hsSound" checked />
            <span>Play chime on status change</span>
          </label>

          <label class="modal-label">Banner duration (seconds)</label>
          <input class="modal-input" id="hsBannerTtl" type="number" min="5" max="120" value="30" />

          <label class="modal-label">Poll interval (seconds)</label>
          <input class="modal-input" id="hsPollInterval" type="number" min="1" max="30" value="2" />

          <div class="modal-actions">
            <button class="modal-btn cancel">Close</button>
            <button class="modal-btn primary save-settings">Save</button>
          </div>
        </div>
      </div>
    </template>

    <div id="toast"></div>
    <script src="/static/vendor/xterm.min.js"></script>
    <script src="/static/vendor/xterm-addon-fit.min.js"></script>
    <script src="/static/vendor/xterm-addon-web-links.min.js"></script>
    <script src="/static/vendor/xterm-addon-webgl.min.js"></script>
    <script src="/static/vendor/xterm-addon-canvas.min.js"></script>
    <script src="/static/sprite.js?v=57"></script>
    <script type="module" src="/static/app.js?v=90"></script>
  </body>
</html>
